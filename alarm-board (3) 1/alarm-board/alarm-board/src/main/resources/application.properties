#none: Hibernate does nothing with the schema.
#
#validate: Checks if the schema matches your entity mappings, but doesnt change anything.
#
#update: Updates the schema automatically to match your entities (adds new columns, tables, etc. but won\u2019t drop existing data).
#
#create: Drops and recreates the schema at startup (data loss).
#
#create-drop: Same as create, but also drops schema when the app shuts down.
spring.jpa.hibernate.ddl-auto=update


#Purpose: Enables logging of SQL statements generated by Hibernate.
#
#Effect: Every query (SELECT, INSERT, UPDATE, DELETE) executed by JPA/Hibernate will be printed to the console.
#
#Benefit: Helps you debug and understand what Hibernate is actually sending to the database. Very useful during development, but often turned off in production to reduce log noise.
spring.jpa.show-sql=true


#Purpose: Tells Hibernate how to generate SQL optimized for your database.
#
#Why needed: Different databases (MySQL, PostgreSQL, Oracle, etc.) have slightly different SQL syntax and features. The dialect ensures Hibernate produces compatible queries.
#
#Your setting (MySQLDialect): Ensures Hibernate uses MySQL-specific SQL (e.g., LIMIT instead of TOP, correct data types, etc.).
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect